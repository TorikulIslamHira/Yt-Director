name: CI & Deploy

on:
  push:
    branches:
      - main
      - Dev
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: YT-Director
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: YT-Director/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: YT-Director
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # actions/checkout defaults to `git clean -ffdx`, which would wipe
          # YT-Director/data (sqlite db + generated BGM files) and the
          # server's YT-Director/.env (API keys) on every run.
          clean-exclude: |
            YT-Director/data
            YT-Director/.env*

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zero-downtime reload
        run: pm2 reload ecosystem.config.js --update-env
