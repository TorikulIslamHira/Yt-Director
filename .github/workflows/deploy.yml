name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: YT-Director
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # actions/checkout defaults to `git clean -ffdx`, which would wipe
          # YT-Director/data (sqlite db + generated BGM files) on every run.
          clean-exclude: YT-Director/data

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zero-downtime reload
        run: pm2 reload ecosystem.config.js --update-env
